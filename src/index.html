<!doctype html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <title>Level Up</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>

                    "tertiary": "#ffd3be",

                    "on-error": "#690005",
                    "primary": "#a4e6ff",
                    "background": "#0e1417",

                    "sm": "12px",
                    "margin": "32px",
                    "xs": "4px",
                    "gutter": "24px"

                    "body-sm": ["Geist"],
                    "display-lg": ["Geist"],
                    "headline-md": ["Geist"],
                    "body-base": ["Geist"],
                    "display-lg-mobile": ["Geist"],
                    "stats-number": ["Geist"],
                    "label-mono": ["JetBrains Mono"]

  <style>
      .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .icon-fill {
          font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      
      /* Custom scrollbar for Kanban columns */
      .kanban-scroll::-webkit-scrollbar {
          width: 4px;
      }
      .kanban-scroll::-webkit-scrollbar-track {
          background: transparent;
      }
      .kanban-scroll::-webkit-scrollbar-thumb {
          background-color: #2f3639;
          border-radius: 4px;
      }
      body { font-family: 'Geist', sans-serif; }

<body class="bg-background text-on-surface font-body-base antialiased selection:bg-primary/30 selection:text-primary">
