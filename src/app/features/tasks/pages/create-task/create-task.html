<div class="mb-lg flex flex-col md:flex-row md:items-end justify-between gap-md animate-fade-in">
  <div>
    <div class="flex items-center gap-sm text-primary mb-xs">
      <span class="material-symbols-outlined">add_task</span>
      <span class="text-label-mono font-label-mono uppercase tracking-widest">Mission Creation</span>
    </div>
    <h1 class="font-display-lg text-display-lg text-on-surface">Create Task</h1>
    <p class="text-on-surface-variant mt-xs max-w-xl">Initialize a new tactical mission and define its operational parameters.</p>
  </div>
  <div class="flex gap-sm">
    <button (click)="onCancel()" class="px-md h-12 rounded-lg border border-outline-variant hover:bg-surface-variant/30 transition-all flex items-center gap-xs text-on-surface-variant cursor-pointer">
      <span class="material-symbols-outlined text-body-base">arrow_back</span>
      <span>Back</span>
    </button>
  </div>
</div>

<div *ngIf="errorMessage" class="bg-error/10 border border-error text-error p-md rounded-xl mb-md flex items-center gap-sm mt-lg">
    <span class="material-symbols-outlined">warning</span> {{ errorMessage }}
</div>

<form class="grid grid-cols-1 lg:grid-cols-12 gap-gutter mt-lg animate-fade-in-up" (ngSubmit)="onSubmit()">
  <div class="lg:col-span-8 space-y-gutter">
    <div class="bg-surface-container/40 backdrop-blur-md border border-white/5 p-lg rounded-xl shadow-sm">
      <h3 class="font-headline-md text-headline-md mb-lg text-on-surface flex items-center gap-sm">
        <span class="material-symbols-outlined text-primary">target</span>
        Mission Objectives
      </h3>
      
      <div class="space-y-lg">
        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="title">Mission Title *</label>
          <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
            <input class="w-full bg-transparent border-none focus:ring-0 text-headline-md font-semibold text-on-surface placeholder:text-surface-variant outline-none" id="title" type="text" [(ngModel)]="formData.title" name="title" placeholder="Enter task name..." required />
          </div>
        </div>
        
        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="desc">Strategic Brief (Description)</label>
          <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
            <textarea class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface placeholder:text-surface-variant resize-none outline-none custom-scrollbar" id="desc" [(ngModel)]="formData.description" name="description" placeholder="Describe the mission objectives..." rows="4"></textarea>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
          <div class="group">
            <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="priority">Priority Level</label>
            <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                <select id="priority" [(ngModel)]="formData.priority" name="priority" class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface appearance-none outline-none">
                    <option class="bg-surface-container text-on-surface" [ngValue]="0">Low-Risk (+10 XP)</option>
                    <option class="bg-surface-container text-on-surface" [ngValue]="1">High-Priority (+20 XP)</option>
                    <option class="bg-surface-container text-on-surface" [ngValue]="2">Critical-Path (+30 XP)</option>
                </select>
            </div>
          </div>
          <div class="group">
            <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="dueDate">Deadline</label>
            <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                <input class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface placeholder:text-surface-variant outline-none" id="dueDate" type="date" [(ngModel)]="formData.dueDate" [min]="minDate" name="dueDate" />
            </div>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
            <div class="group">
                <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="estimatedMinutes">Time Estimation</label>
                <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm flex items-center gap-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                  <input class="w-full bg-transparent border-none focus:ring-0 text-on-surface outline-none" id="estimatedMinutes" type="number" [(ngModel)]="formData.estimatedMinutes" name="estimatedMinutes" min="1" max="1440"/>
                  <span class="text-on-surface-variant font-label-mono pr-sm">MINS</span>
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="lg:col-span-4 space-y-gutter">
    <div class="flex flex-col gap-sm sticky top-24">
      <button class="bg-gradient-to-r from-primary to-secondary py-lg rounded-xl text-on-primary font-black uppercase tracking-widest shadow-[0_0_20px_rgba(164,230,255,0.3)] hover:shadow-[0_0_30px_rgba(164,230,255,0.5)] transition-all active:scale-[0.98] flex items-center justify-center gap-md disabled:opacity-50 disabled:cursor-not-allowed" type="submit" [disabled]="isLoading">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
        {{ isLoading ? 'Initializing...' : 'Deploy Mission' }}
      </button>
      <button type="button" (click)="onCancel()" class="text-center text-label-mono text-on-surface-variant hover:text-on-surface py-sm transition-colors cursor-pointer uppercase tracking-widest mt-xs w-full">
         Cancel Operation
      </button>
    </div>
  </div>
</form>
