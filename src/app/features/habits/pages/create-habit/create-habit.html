<div class="mb-lg flex flex-col md:flex-row md:items-end justify-between gap-md animate-fade-in">
  <div>
    <div class="flex items-center gap-sm text-primary mb-xs">
      <span class="material-symbols-outlined">add_box</span>
      <span class="text-label-mono font-label-mono uppercase tracking-widest">Protocol Creation</span>
    </div>
    <h1 class="font-display-lg text-display-lg text-on-surface">Create Habit</h1>
    <p class="text-on-surface-variant mt-xs max-w-xl">Initialize a new neural pathway. Define the parameters for your next synchronization cycle.</p>
  </div>
  <div class="flex gap-sm">
    <a [routerLink]="['/habits']" class="px-md h-12 rounded-lg border border-outline-variant hover:bg-surface-variant/30 transition-all flex items-center gap-xs text-on-surface-variant cursor-pointer">
      <span class="material-symbols-outlined text-body-base">arrow_back</span>
      <span>Back</span>
    </a>
  </div>
</div>

<div *ngIf="errorMessage" class="bg-error/10 border border-error text-error p-md rounded-xl mb-md flex items-center gap-sm mt-lg">
    <span class="material-symbols-outlined">warning</span> {{ errorMessage }}
</div>

<form class="grid grid-cols-1 lg:grid-cols-12 gap-gutter mt-lg animate-fade-in-up" (ngSubmit)="submit()">
  <div class="lg:col-span-8 space-y-gutter">
    <div class="bg-surface-container/40 backdrop-blur-md border border-white/5 p-lg rounded-xl shadow-sm">
      <h3 class="font-headline-md text-headline-md mb-lg text-on-surface flex items-center gap-sm">
        <span class="material-symbols-outlined text-primary">terminal</span>
        Core Identity
      </h3>
      
      <div class="space-y-lg">
        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="title">Habit Title *</label>
          <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
            <input class="w-full bg-transparent border-none focus:ring-0 text-headline-md font-semibold text-on-surface placeholder:text-surface-variant outline-none" id="title" type="text" [(ngModel)]="dto.title" name="title" placeholder="e.g. Morning Run" required />
          </div>
        </div>
        
        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="desc">Description</label>
          <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
            <textarea class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface placeholder:text-surface-variant resize-none outline-none custom-scrollbar" id="desc" [(ngModel)]="dto.description" name="description" placeholder="Optional description..." rows="3"></textarea>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
          <div class="group">
            <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="category">Category *</label>
            <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                <input class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface placeholder:text-surface-variant outline-none" id="category" type="text" [(ngModel)]="dto.category" name="category" placeholder="e.g. Health, Learning" required />
            </div>
          </div>
          <div class="group">
            <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="frequency">Frequency Protocol</label>
            <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                <select id="frequency" [(ngModel)]="dto.frequencyType" name="frequencyType" class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface appearance-none outline-none">
                    <option class="bg-surface-container text-on-surface" value="Daily">Daily</option>
                    <option class="bg-surface-container text-on-surface" value="Weekly">Weekly</option>
                </select>
            </div>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-lg">
            <div class="group">
                <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="targetCount">Target Quota</label>
                <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm flex items-center gap-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                  <input class="w-full bg-transparent border-none focus:ring-0 text-on-surface outline-none" id="targetCount" type="number" [(ngModel)]="dto.targetCount" name="targetCount" min="1" placeholder="1"/>
                  <span class="text-on-surface-variant font-label-mono pr-sm">COUNT</span>
                </div>
            </div>
            <div class="group">
                <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="icon">Icon (emoji)</label>
                <div class="flex flex-col gap-sm">
                  <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
                      <input class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface placeholder:text-surface-variant outline-none" id="icon" type="text" [(ngModel)]="dto.icon" name="icon" placeholder="e.g. 🏃" />
                  </div>
                  <div class="flex flex-wrap gap-xs">
                    <button 
                      type="button"
                      *ngFor="let emoji of iconOptions"
                      class="w-9 h-9 rounded-lg bg-surface-container-lowest border hover:border-primary/50 text-[16px] flex items-center justify-center transition-all cursor-pointer active:scale-90"
                      [class.border-primary]="dto.icon === emoji"
                      [class.border-outline-variant]="dto.icon !== emoji"
                      (click)="dto.icon = emoji">
                      {{ emoji }}
                    </button>
                  </div>
                </div>
            </div>
            <div class="group">
                <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider">Color Theme</label>
                <div class="flex items-center gap-sm h-12">
                  <button 
                    type="button"
                    *ngFor="let color of colorOptions" 
                    class="w-8 h-8 rounded-full border-2 transition-all cursor-pointer hover:scale-110 active:scale-95"
                    [style.background-color]="color"
                    [class.border-white]="dto.color === color"
                    [class.border-transparent]="dto.color !== color"
                    (click)="dto.color = color">
                  </button>
                  <input class="w-8 h-8 rounded cursor-pointer bg-transparent border-none p-0 outline-none ml-auto" id="color" type="color" [(ngModel)]="dto.color" name="color" />
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <div class="lg:col-span-4 space-y-gutter">
    <div class="flex flex-col gap-sm sticky top-24">
      <button class="bg-gradient-to-r from-primary to-secondary py-lg rounded-xl text-on-primary font-black uppercase tracking-widest shadow-[0_0_20px_rgba(164,230,255,0.3)] hover:shadow-[0_0_30px_rgba(164,230,255,0.5)] transition-all active:scale-[0.98] flex items-center justify-center gap-md disabled:opacity-50 disabled:cursor-not-allowed" type="submit" [disabled]="isSubmitting">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
        {{ isSubmitting ? 'Initializing...' : 'Deploy Protocol' }}
      </button>
      <a [routerLink]="['/habits']" class="text-center text-label-mono text-on-surface-variant hover:text-on-surface py-sm transition-colors cursor-pointer uppercase tracking-widest mt-xs">
         Cancel Operation
      </a>
    </div>
  </div>
</form>
