<div class="form-page">
  <div class="form-header">
    <h1>🌱 Create New Habit</h1>
    <a [routerLink]="['/habits']" class="btn-back">← Back</a>
  </div>

  <div *ngIf="errorMessage" class="error-message">⚠️ {{ errorMessage }}</div>

  <form class="habit-form" (ngSubmit)="submit()">

    <div class="form-group">
      <label for="habit-title">Title *</label>
      <input id="habit-title" type="text" [(ngModel)]="dto.title" name="title"
             placeholder="e.g. Morning Run" required />
    </div>

    <div class="form-group">
      <label for="habit-desc">Description</label>
      <textarea id="habit-desc" [(ngModel)]="dto.description" name="description"
                placeholder="Optional description..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label for="habit-category">Category *</label>
      <input id="habit-category" type="text" [(ngModel)]="dto.category" name="category"
             placeholder="e.g. Health, Learning" required />
    </div>

    <div class="form-group">
      <label for="habit-frequency">Frequency</label>
      <select id="habit-frequency" [(ngModel)]="dto.frequencyType" name="frequencyType">
        <option [ngValue]="0">Daily</option>
        <option [ngValue]="1">Weekly</option>
      </select>
    </div>

    <div class="form-group">
      <label for="habit-target">Target Count</label>
      <input id="habit-target" type="number" [(ngModel)]="dto.targetCount" name="targetCount"
             min="1" placeholder="1" />
    </div>

    <div class="form-group">
      <label for="habit-icon">Icon (emoji)</label>
      <input id="habit-icon" type="text" [(ngModel)]="dto.icon" name="icon"
             placeholder="e.g. 🏃" />
    </div>

    <div class="form-group">
      <label for="habit-color">Color (hex)</label>
      <input id="habit-color" type="color" [(ngModel)]="dto.color" name="color" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Creating...' : '✅ Create Habit' }}
      </button>
      <a [routerLink]="['/habits']" class="btn-secondary">Cancel</a>
    </div>

  </form>
</div>
