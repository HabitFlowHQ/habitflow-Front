<div class="form-page">
  <div class="form-header">
    <h1>✏️ Edit Habit</h1>
    <a [routerLink]="['/habits', habitId]" class="btn-back">← Back</a>
  </div>

  <div *ngIf="isLoading">Loading habit...</div>
  <div *ngIf="errorMessage" class="error-message">⚠️ {{ errorMessage }}</div>

  <form class="habit-form" (ngSubmit)="submit()" *ngIf="!isLoading">

    <div class="form-group">
      <label for="edit-title">Title *</label>
      <input id="edit-title" type="text" [(ngModel)]="dto.title" name="title"
             placeholder="Habit title" required />
    </div>

    <div class="form-group">
      <label for="edit-desc">Description</label>
      <textarea id="edit-desc" [(ngModel)]="dto.description" name="description"
                placeholder="Optional description..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label for="edit-category">Category *</label>
      <input id="edit-category" type="text" [(ngModel)]="dto.category" name="category"
             placeholder="e.g. Health, Learning" required />
    </div>

    <div class="form-group">
      <label for="edit-frequency">Frequency</label>
      <select id="edit-frequency" [(ngModel)]="dto.frequencyType" name="frequencyType">
        <option value="Daily">Daily</option>
        <option value="Weekly">Weekly</option>
      </select>
    </div>

    <div class="form-group">
      <label for="edit-target">Target Count</label>
      <input id="edit-target" type="number" [(ngModel)]="dto.targetCount" name="targetCount"
             min="1" />
    </div>

    <div class="form-group">
      <label for="edit-icon">Icon (emoji)</label>
      <input id="edit-icon" type="text" [(ngModel)]="dto.icon" name="icon"
             placeholder="e.g. 🏃" />
    </div>

    <div class="form-group">
      <label for="edit-color">Color (hex)</label>
      <input id="edit-color" type="color" [(ngModel)]="dto.color" name="color" />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Saving...' : '💾 Save Changes' }}
      </button>
      <a [routerLink]="['/habits', habitId]" class="btn-secondary">Cancel</a>
    </div>

  </form>
</div>
