<div class="max-w-4xl mx-auto space-y-lg">
  <header class="mb-lg">
    <h2 class="font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface font-bold tracking-tighter">Settings</h2>
    <p class="font-body-base text-body-base text-on-surface-variant mt-base">Manage your profile, preferences, and security settings.</p>
  </header>

  <!-- Settings Content Grids -->
  <div class="grid grid-cols-1 md:grid-cols-12 gap-lg">
    
    <!-- Left Column (Profile & Account Actions) -->
    <div class="md:col-span-7 space-y-lg">
      
      <!-- Profile Card -->
      <section class="bg-surface-container rounded-xl p-md border-t border-white/5 relative overflow-hidden group">
        <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
        <div class="flex items-center justify-between mb-md border-b border-surface-variant/30 pb-3">
          <h3 class="font-headline-md text-[18px] font-semibold text-on-surface flex items-center gap-sm">
            <span class="material-symbols-outlined text-[20px] text-primary">person</span>
            Profile Information
          </h3>
        </div>

        <!-- Avatar Upload -->
        <div class="flex flex-col sm:flex-row gap-md items-start sm:items-center mb-md">
          <div class="relative">
            <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-surface-variant relative z-10 group-hover:border-primary/50 transition-colors">
              <img [src]="avatarUrl" alt="User Avatar" class="w-full h-full object-cover"/>
            </div>
            <label class="absolute bottom-0 right-0 bg-surface-variant border border-surface-bright rounded-full p-xs text-on-surface hover:text-primary transition-colors z-20 cursor-pointer">
              <span class="material-symbols-outlined text-[16px]">edit</span>
              <input type="file" (change)="onAvatarUpload($event)" accept="image/*" class="hidden" />
            </label>
          </div>
          <div class="flex-1 space-y-xs w-full">
            <div>
              <p class="font-label-mono text-label-mono text-on-surface-variant mb-xs">Profile Picture</p>
              <p class="text-xs text-on-surface-variant">JPG, GIF or PNG. Max size of 2MB.</p>
            </div>
          </div>
        </div>

        <!-- Fields -->
        <div class="space-y-md">
          <div>
            <label class="font-label-mono text-label-mono text-on-surface-variant block mb-xs">Full Name</label>
            <input 
              type="text" 
              [(ngModel)]="fullName" 
              class="w-full bg-surface text-on-surface font-body-sm text-body-sm rounded-lg border border-surface-variant px-sm py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" 
              placeholder="Enter your full name"
            />
          </div>

          <div>
            <label class="font-label-mono text-label-mono text-on-surface-variant block mb-xs">Email Address</label>
            <input 
              type="email" 
              [(ngModel)]="email" 
              class="w-full bg-surface text-on-surface font-body-sm text-body-sm rounded-lg border border-surface-variant px-sm py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" 
              placeholder="Enter your email address"
            />
          </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-sm mt-lg pt-md border-t border-surface-variant/30">
          <button 
            type="button" 
            (click)="onCancel()" 
            class="px-md py-sm bg-surface-variant text-on-surface rounded-lg font-body-sm text-body-sm font-semibold hover:bg-surface-bright transition-colors">
            Cancel
          </button>
          <button 
            type="button" 
            (click)="onSaveProfile()" 
            class="bg-primary text-on-primary font-body-sm text-body-sm font-semibold py-sm px-md rounded-lg hover:bg-primary-fixed transition-colors shadow-[0_0_10px_rgba(164,230,255,0.1)]">
            Save Changes
          </button>
        </div>
      </section>

    </div>

    <!-- Right Column (Security / Password Setting) -->
    <div class="md:col-span-5 space-y-lg">
      
      <!-- Security Card -->
      <section class="bg-surface-container rounded-xl p-md border-t border-white/5">
        <h3 class="font-headline-md text-[18px] font-semibold text-on-surface flex items-center gap-sm mb-md border-b border-surface-variant/30 pb-3">
          <span class="material-symbols-outlined text-[20px] text-error">lock</span>
          Security
        </h3>

        <div class="space-y-md">
          <!-- Current Password -->
          <div>
            <label class="font-label-mono text-label-mono text-on-surface-variant block mb-xs">Current Password</label>
            <div class="relative">
              <input 
                [type]="showCurrentPassword ? 'text' : 'password'" 
                [(ngModel)]="currentPassword" 
                class="w-full bg-surface text-on-surface font-body-sm text-body-sm rounded-lg border border-surface-variant px-sm py-sm pr-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" 
                placeholder="••••••••"
              />
              <button 
                type="button" 
                (click)="showCurrentPassword = !showCurrentPassword" 
                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface">
                <span class="material-symbols-outlined text-[18px]">{{ showCurrentPassword ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>

          <!-- New Password -->
          <div>
            <label class="font-label-mono text-label-mono text-on-surface-variant block mb-xs">New Password</label>
            <div class="relative">
              <input 
                [type]="showNewPassword ? 'text' : 'password'" 
                [(ngModel)]="newPassword" 
                class="w-full bg-surface text-on-surface font-body-sm text-body-sm rounded-lg border border-surface-variant px-sm py-sm pr-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" 
                placeholder="••••••••"
              />
              <button 
                type="button" 
                (click)="showNewPassword = !showNewPassword" 
                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface">
                <span class="material-symbols-outlined text-[18px]">{{ showNewPassword ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="font-label-mono text-label-mono text-on-surface-variant block mb-xs">Confirm New Password</label>
            <div class="relative">
              <input 
                [type]="showConfirmPassword ? 'text' : 'password'" 
                [(ngModel)]="confirmPassword" 
                class="w-full bg-surface text-on-surface font-body-sm text-body-sm rounded-lg border border-surface-variant px-sm py-sm pr-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" 
                placeholder="••••••••"
              />
              <button 
                type="button" 
                (click)="showConfirmPassword = !showConfirmPassword" 
                class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface">
                <span class="material-symbols-outlined text-[18px]">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</span>
              </button>
            </div>
          </div>
        </div>

        <div class="mt-lg pt-md border-t border-surface-variant/30 flex justify-end">
          <button 
            type="button" 
            (click)="onSavePassword()" 
            class="px-md py-sm bg-error text-on-error rounded-lg font-body-sm text-body-sm font-semibold hover:bg-error-container hover:text-on-error-container transition-colors">
            Update Password
          </button>
        </div>
      </section>

    </div>

  </div>
</div>
