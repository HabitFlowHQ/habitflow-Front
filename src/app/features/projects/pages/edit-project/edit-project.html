<div class="mb-lg flex flex-col md:flex-row md:items-end justify-between gap-md animate-fade-in">
  <div>
    <div class="flex items-center gap-sm text-primary mb-xs">
      <span class="material-symbols-outlined">edit_square</span>
      <span class="text-label-mono font-label-mono uppercase tracking-widest">Protocol Adjustment</span>
    </div>
    <h1 class="font-display-lg text-display-lg text-on-surface">Edit Project</h1>
    <p class="text-on-surface-variant mt-xs max-w-xl">Fine-tune the configurations of your project. Changes synchronize immediately across your task boards.</p>
  </div>
  <div class="flex gap-sm">
    <a [routerLink]="['/projects', projectId]" class="px-md h-12 rounded-lg border border-outline-variant hover:bg-surface-variant/30 transition-all flex items-center gap-xs text-on-surface-variant cursor-pointer">
      <span class="material-symbols-outlined text-body-base">arrow_back</span>
      <span>Back</span>
    </a>
  </div>
</div>

<div *ngIf="isLoading" class="text-primary font-label-mono animate-pulse mt-lg">Loading project configuration...</div>
<div *ngIf="errorMessage" class="bg-error/10 border border-error text-error p-md rounded-xl mb-md flex items-center gap-sm mt-lg">
    <span class="material-symbols-outlined">warning</span> {{ errorMessage }}
</div>

<form class="grid grid-cols-1 lg:grid-cols-12 gap-gutter mt-lg animate-fade-in-up" (ngSubmit)="submit()" *ngIf="!isLoading">
  <div class="lg:col-span-8 space-y-gutter">
    <div class="bg-surface-container/40 backdrop-blur-md border border-white/5 p-lg rounded-xl shadow-sm">
      <h3 class="font-headline-md text-headline-md mb-lg text-on-surface flex items-center gap-sm">
        <span class="material-symbols-outlined text-primary">terminal</span>
        Core Identity
      </h3>
      
      <div class="space-y-lg">
        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="title">Project Title *</label>
          <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
            <input class="w-full bg-transparent border-none focus:ring-0 text-headline-md font-semibold text-on-surface placeholder:text-surface-variant outline-none" id="title" type="text" [(ngModel)]="dto.title" name="title" placeholder="e.g. Q3 Launch Strategy" required />
          </div>
        </div>
        
        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="desc">Description</label>
          <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
            <textarea class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface placeholder:text-surface-variant resize-none outline-none custom-scrollbar" id="desc" [(ngModel)]="dto.description" name="description" placeholder="Optional brief description..." rows="3"></textarea>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
          <div class="group">
            <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider" for="dueDate">Target Deadline</label>
            <div class="border border-outline-variant bg-surface-container-lowest rounded-lg p-sm transition-all focus-within:border-primary focus-within:shadow-[0_0_15px_rgba(164,230,255,0.2)]">
              <input class="w-full bg-transparent border-none focus:ring-0 text-body-base text-on-surface outline-none" id="dueDate" type="date" [(ngModel)]="dueDateString" name="dueDate" />
            </div>
          </div>

          <div class="group">
            <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider">Accent Theme</label>
            <div class="flex items-center gap-sm h-12">
              <button 
                type="button"
                *ngFor="let color of colorOptions" 
                class="w-8 h-8 rounded-full border-2 transition-all cursor-pointer hover:scale-110 active:scale-95"
                [style.background-color]="color"
                [class.border-white]="dto.color === color"
                [class.border-transparent]="dto.color !== color"
                (click)="dto.color = color">
              </button>
            </div>
          </div>
        </div>

        <div class="group">
          <label class="text-label-mono font-label-mono text-on-surface-variant block mb-base uppercase tracking-wider">Workspace Avatar / Icon</label>
          <div class="flex flex-wrap gap-sm">
            <button 
              type="button"
              *ngFor="let emoji of iconOptions"
              class="w-10 h-10 rounded-lg bg-surface-container-lowest border hover:border-primary/50 text-[18px] flex items-center justify-center transition-all cursor-pointer active:scale-90"
              [class.border-primary]="dto.icon === emoji"
              [class.border-outline-variant]="dto.icon !== emoji"
              (click)="dto.icon = emoji">
              {{ emoji }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="lg:col-span-4 space-y-gutter">
    <div class="flex flex-col gap-sm sticky top-24">
      <button class="bg-gradient-to-r from-primary to-secondary py-lg rounded-xl text-on-primary font-black uppercase tracking-widest shadow-[0_0_20px_rgba(164,230,255,0.3)] hover:shadow-[0_0_30px_rgba(164,230,255,0.5)] transition-all active:scale-[0.98] flex items-center justify-center gap-md disabled:opacity-50 disabled:cursor-not-allowed" type="submit" [disabled]="isSubmitting">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
        {{ isSubmitting ? 'Syncing...' : 'Re-Deploy Project' }}
      </button>
      <a [routerLink]="['/projects', projectId]" class="text-center text-label-mono text-on-surface-variant hover:text-on-surface py-sm transition-colors cursor-pointer uppercase tracking-widest mt-xs">
         Cancel Operation
      </a>
    </div>
  </div>
</form>
