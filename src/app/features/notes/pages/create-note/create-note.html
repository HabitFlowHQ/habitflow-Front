<div class="form-page">
 
  <div class="form-header">
    <h1>📝 New Note</h1>
    <a class="btn-back" [routerLink]="['/notes']">← Back</a>
  </div>
 
  <div *ngIf="errorMessage" class="error-message">⚠️ {{ errorMessage }}</div>
 
  <form class="note-form" (ngSubmit)="onSubmit()">
 
    <div class="form-group">
      <label for="title">Title *</label>
      <input
        id="title"
        type="text"
        placeholder="Note title..."
        [(ngModel)]="form.title"
        name="title"
        maxlength="200"
      />
    </div>
 
    <div class="form-group">
      <label for="content">Content *</label>
      <textarea
        id="content"
        rows="10"
        placeholder="Write your note here..."
        [(ngModel)]="form.content"
        name="content"
      ></textarea>
    </div>
 
    <div class="form-group">
      <label for="tags">Tags <span class="label-hint">(comma separated, e.g. work, ideas)</span></label>
      <input
        id="tags"
        type="text"
        placeholder="work, ideas, coding..."
        [(ngModel)]="form.tags"
        name="tags"
        maxlength="500"
      />
    </div>
 
    <div class="form-group form-check">
      <label class="checkbox-label flex items-center gap-2 cursor-pointer select-none">
        <input
          type="checkbox"
          [(ngModel)]="form.isPinned"
          name="isPinned"
          class="rounded border-border bg-bg-surface text-primary focus:ring-primary/40 focus:ring-2"
        />
        <span>📌 Pin this note</span>
      </label>
    </div>
 
    <div class="form-actions">
      <button class="btn-primary" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Saving...' : '💾 Save Note' }}
      </button>
      <a class="btn-secondary" [routerLink]="['/notes']">Cancel</a>
    </div>
 
  </form>
 
</div>
